name: CI

on: [push, pull_request]

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-secret-key-not-used-in-production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff bandit==1.9.4

      - name: Lint
        run: ruff check .

      - name: Security scan (bandit)
        run: bandit -r . -x wsl_venv,tests -lll

      - name: Run tests
        run: python manage.py test --verbosity=2

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t cobblemon-returns:ci .
