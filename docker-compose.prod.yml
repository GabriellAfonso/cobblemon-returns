services:
  cobblemon_returns:
    container_name: cobblemon-returns-prod
    build:
      context: .
    image: cobblemon-returns:prod
    command:
      - sh
      - -c
      - |
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        gunicorn core.wsgi:application \
          --bind 0.0.0.0:8000 \
          --workers 4 \
          --timeout 120 \
          --keep-alive 5 \
          --access-logfile - \
          --error-logfile - \
          --capture-output
    env_file:
      - ./.env
    volumes:
      - ./static/:/static/
      - ./media/:/media/
      - ~/.ssh/id_rsa:/run/secrets/sftp_key:ro
    depends_on:
      cobblemon_db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/cobblemon-returns/health/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - proxy-network

  cobblemon_db:
    container_name: cobblemon-db-prod
    image: postgres:16-alpine
    env_file:
      - ./.env
    volumes:
      - cobblemon_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - proxy-network

volumes:
  cobblemon_postgres_data:

networks:
  proxy-network:
    external: true
